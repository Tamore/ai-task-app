services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/ai-tasks
      - REDIS_URI=redis://redis:6379
      - JWT_SECRET=supersecret123
    depends_on:
      - mongo
      - redis

  worker:
    build: ./worker
    environment:
      - MONGO_URI=mongodb://mongo:27017/ai-tasks
      - REDIS_URI=redis://redis:6379
    depends_on:
      - mongo
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongo-data:
  redis-data:
